name: Publish JamfSchoolKit to PowerShell Gallery

# Publishes when a jamfschoolkit-v* tag is pushed.
# Requires the repository secret PSGALLERY_API_KEY.

on:
  push:
    tags: ['jamfschoolkit-v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
        working-directory: JamfSchoolKit
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          Install-Module Pester -MinimumVersion 5.5 -Force -Scope CurrentUser
          Install-Module PSScriptAnalyzer -MinimumVersion 1.22 -Force -Scope CurrentUser

      - name: Build and test
        run: ./build.ps1

      - name: Publish
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          Publish-PSResource -Path ./dist/JamfSchoolKit -Repository PSGallery -ApiKey $env:PSGALLERY_API_KEY
